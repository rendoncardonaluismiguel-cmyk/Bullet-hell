// ── PERSISTENCE ───────────────────────────────
let beaten=new Set(JSON.parse(localStorage.getItem('nr_beaten')||'[]'));
let stHi=JSON.parse(localStorage.getItem('nr_sthi')||'{}');
let hiScore=+localStorage.getItem('nr_hi')||0;
let coins=+localStorage.getItem('nr_coins')||0;
let upgrades=JSON.parse(localStorage.getItem('nr_upg')||'{"bombs":0,"lives":0,"shield":0,"power2":0,"rapid":0,"speed":0,"multi":0,"rebomb":0}');
function save(){
  localStorage.setItem('nr_beaten',JSON.stringify([...beaten]));
  localStorage.setItem('nr_sthi',JSON.stringify(stHi));
  localStorage.setItem('nr_coins',coins);
  localStorage.setItem('nr_upg',JSON.stringify(upgrades));
  if(score>hiScore){hiScore=score;localStorage.setItem('nr_hi',hiScore);}
}
function saveStage(si){const b=stHi[si]||0;if(score>b){stHi[si]=score;save();}}
function unlockB(id){if(!beaten.has(id)){beaten.add(id);save();}}
function isUnlocked(si){return si===0||beaten.has(si-1);}
function envForWave(w){return STAGES[Math.min(Math.floor(w/5),5)].env;}
function stageForWave(w){return Math.min(Math.floor(w/5),5);}
function SM(){return upgrades.multi?2:1;}
function getFireRate(){return .12*Math.pow(.82,upgrades.rapid||0);}
function buyItem(idx){
  const it=SHOP[idx];if(!it)return;
  const cur=upgrades[it.upg]||0;if(cur>=it.max||coins<it.price)return;
  coins-=it.price;upgrades[it.upg]=cur+1;save();
}

let bossWarnT=0,trans=false,transT=0,flashT=0,invinc=0,gt=0;

let plyr={},pB=[],eB=[],enems=[],pts=[],pups=[],boss=null;
let stars=[],wparts=[];let spawnQ=[],spawnT2=0,lastT=0;
let menuOpen=false,menuTab='stages';

// ── JUMP TO STAGE ─────────────────────────────
function applyUpgrades(){
  bombs=bombs+(upgrades.bombs||0);
  lives=lives+(upgrades.lives||0);
  if(upgrades.power2)pow=2;
  if(upgrades.shield)invinc=4;
}
function jumpStage(i){
  menuOpen=false;if(!isUnlocked(i))return;
  const sd=STAGES[i];
  score=0;lives=3;pow=1;powT=0;bombs=2;
  wave=sd.wS;wKills=0;wNeed=0;trans=false;transT=0;flashT=0;invinc=0;gt=0;
  pB=[];eB=[];enems=[];pts=[];pups=[];boss=null;spawnQ=[];spawnT2=0;
  curStage=i;curEnv=sd.env;initStars();initWeather();initPlyr();applyUpgrades();loadWave(wave);
}
function startGame(){
  score=0;lives=3;pow=1;powT=0;bombs=2;
  wave=0;wKills=0;wNeed=0;trans=false;transT=0;flashT=0;invinc=0;gt=0;
  pB=[];eB=[];enems=[];pts=[];pups=[];boss=null;spawnQ=[];spawnT2=0;
  curStage=0;curEnv='cyber';initStars();initWeather();initPlyr();applyUpgrades();loadWave(0);
}
function restartStage(){
  const sd=STAGES[curStage];
  score=0;lives=3;pow=1;powT=0;bombs=2;
  wave=sd.wS;wKills=0;wNeed=0;trans=false;transT=0;flashT=0;invinc=0;gt=0;
  pB=[];eB=[];enems=[];pts=[];pups=[];boss=null;spawnQ=[];spawnT2=0;
  curEnv=sd.env;initStars();initWeather();initPlyr();applyUpgrades();loadWave(wave);
}

// ── STARS ─────────────────────────────────────
function initStars(){
  stars=[];const e=ENVS[curEnv];
  for(let i=0;i<100;i++)stars.push({x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.4+.3,spd:Math.random()*70+22,br:Math.random(),col:Math.random()>.4?e.star:e.starD});
}
function updateStars(dt){for(const s of stars){s.y+=s.spd*dt*SC/15;if(s.y>H){s.y=-2;s.x=Math.random()*W;}}}
function drawStars(){for(const s of stars){ctx.globalAlpha=.2+s.br*.65;ctx.fillStyle=s.col;ctx.beginPath();ctx.arc(s.x,s.y,s.r*SC,0,Math.PI*2);ctx.fill();}ctx.globalAlpha=1;}

// ── WEATHER ───────────────────────────────────
function initWeather(){wparts=[];const wt=ENVS[curEnv].wt;for(let i=0;i<70;i++)wparts.push(mkW(wt,true));}
function mkW(wt,sc){
  const p={wt};
  if(wt==='code_rain') {p.x=Math.random()*W;p.y=sc?Math.random()*H:-8;p.vy=(100+Math.random()*100)*SC;p.w=(.6+Math.random()*.8)*SC;p.h=(4+Math.random()*10)*SC;p.a=.2+Math.random()*.25;}
  if(wt==='embers')    {p.x=Math.random()*W;p.y=sc?Math.random()*H:H+5;p.vy=-(25+Math.random()*35)*SC;p.vx=(Math.random()-.5)*12*SC;p.r=(.5+Math.random()*1.2)*SC;p.ph=Math.random()*Math.PI*2;p.a=.3+Math.random()*.35;}
  if(wt==='snow')      {p.x=Math.random()*W;p.y=sc?Math.random()*H:-5;p.vy=(18+Math.random()*28)*SC;p.vx=(Math.random()-.5)*10*SC;p.r=(.4+Math.random()*1.5)*SC;p.ph=Math.random()*Math.PI*2;p.a=.3+Math.random()*.4;}
  if(wt==='bubbles')   {p.x=Math.random()*W;p.y=sc?Math.random()*H:H+5;p.vy=-(16+Math.random()*32)*SC;p.vx=(Math.random()-.5)*7*SC;p.r=(1+Math.random()*2.8)*SC;p.ph=Math.random()*Math.PI*2;p.a=.1+Math.random()*.15;}
  if(wt==='solar_wind'){p.x=sc?Math.random()*W:-25;p.y=Math.random()*H;p.vx=(200+Math.random()*180)*SC;p.len=(10+Math.random()*24)*SC;p.a=.1+Math.random()*.15;}
  if(wt==='void_wisps'){p.x=Math.random()*W;p.y=sc?Math.random()*H:(Math.random()>.5?-30:H+30);p.vx=(Math.random()-.5)*14*SC;p.vy=(Math.random()-.5)*14*SC;p.r=(2+Math.random()*5)*SC;p.ph=Math.random()*Math.PI*2;p.ps=(Math.random()-.5)*1.8;p.a=.2+Math.random()*.3;}
  return p;
}
function updateWeather(dt){
  const wt=ENVS[curEnv].wt;
  for(let i=0;i<wparts.length;i++){
    const p=wparts[i];
    if(wt==='code_rain')  {p.y+=p.vy*dt;if(p.y>H+12)wparts[i]=mkW(wt,false);}
    if(wt==='embers')     {p.ph+=dt*1.8;p.x+=Math.sin(p.ph*.9)*10*SC*dt+p.vx*dt;p.y+=p.vy*dt;if(p.y<-10)wparts[i]=mkW(wt,false);}
    if(wt==='snow')       {p.ph+=dt;p.x+=Math.sin(p.ph*.7)*8*SC*dt+p.vx*dt;p.y+=p.vy*dt;p.x=((p.x%W)+W)%W;if(p.y>H+10)wparts[i]=mkW(wt,false);}
    if(wt==='bubbles')    {p.ph+=dt;p.x+=Math.sin(p.ph*.8)*7*SC*dt+p.vx*dt;p.y+=p.vy*dt;p.x=((p.x%W)+W)%W;if(p.y<-12)wparts[i]=mkW(wt,false);}
    if(wt==='solar_wind') {p.x+=p.vx*dt;if(p.x>W+30)wparts[i]=mkW(wt,false);}
    if(wt==='void_wisps') {p.ph+=p.ps*dt;p.x+=p.vx*dt+Math.sin(p.ph)*4*SC*dt;p.y+=p.vy*dt+Math.cos(p.ph)*4*SC*dt;if(p.x<-60||p.x>W+60||p.y<-60||p.y>H+60)wparts[i]=mkW(wt,false);}
  }
}
function drawWeather(){
  const wt=ENVS[curEnv].wt,wc=ENVS[curEnv].wc;
  ctx.save();
  for(const p of wparts){
    ctx.globalAlpha=p.a;
    if(wt==='code_rain')  {ctx.fillStyle=wc;ctx.fillRect(p.x,p.y,p.w,p.h);}
    if(wt==='embers')     {ctx.fillStyle=wc;ctx.shadowColor=wc;ctx.shadowBlur=4;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;}
    if(wt==='snow')       {ctx.fillStyle=wc;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();}
    if(wt==='bubbles')    {ctx.strokeStyle=wc;ctx.lineWidth=.7;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.stroke();}
    if(wt==='solar_wind') {ctx.strokeStyle=wc;ctx.lineWidth=.9;ctx.beginPath();ctx.moveTo(p.x,p.y);ctx.lineTo(p.x-p.len,p.y);ctx.stroke();}
    if(wt==='void_wisps') {const g=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,p.r);g.addColorStop(0,wc+'bb');g.addColorStop(1,wc+'00');ctx.fillStyle=g;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();}
  }
  ctx.restore();ctx.globalAlpha=1;
}

// ── ENV BACKGROUND ────────────────────────────
function drawEnvBg(){
  const e=ENVS[curEnv];
  const g=ctx.createLinearGradient(0,0,0,H);g.addColorStop(0,e.bg[0]);g.addColorStop(.5,e.bg[1]);g.addColorStop(1,e.bg[2]);
  ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
  // Top ambient light
  ctx.globalAlpha=e.lA;const lg=ctx.createRadialGradient(W/2,0,0,W/2,0,W*.8);lg.addColorStop(0,e.lc);lg.addColorStop(1,'transparent');ctx.fillStyle=lg;ctx.fillRect(0,0,W,H*.6);ctx.globalAlpha=1;
  // Per-env details
  if(curEnv==='cyber'){
    ctx.globalAlpha=e.gA;ctx.strokeStyle=e.grid;ctx.lineWidth=1;const hz=H*.68;
    for(let i=0;i<=12;i++){const y=hz+(H-hz)*Math.pow(i/12,2.2);ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
    for(let i=0;i<=10;i++){ctx.beginPath();ctx.moveTo(W*i/10,hz);ctx.lineTo(W*i/10,H);ctx.stroke();}
    const fg=ctx.createLinearGradient(0,H*.78,0,H);fg.addColorStop(0,e.floor+'00');fg.addColorStop(1,e.floor+'1a');ctx.globalAlpha=e.gA*2;ctx.fillStyle=fg;ctx.fillRect(0,H*.78,W,H*.22);ctx.globalAlpha=1;
  }
  if(curEnv==='volcanic'){
    const lv=ctx.createLinearGradient(0,H*.7,0,H);lv.addColorStop(0,e.floor+'00');lv.addColorStop(1,'#ff330050');
    ctx.globalAlpha=.18+Math.sin(gt*1.5)*.06;ctx.fillStyle=lv;ctx.fillRect(0,H*.7,W,H*.3);
    ctx.globalAlpha=.1;ctx.strokeStyle=e.floor;ctx.lineWidth=2;
    for(let i=0;i<5;i++){const vx=W*(.1+i*.18);ctx.beginPath();ctx.moveTo(vx,H);ctx.lineTo(vx+Math.sin(i*3)*12,H*.85);ctx.stroke();}ctx.globalAlpha=1;
  }
  if(curEnv==='arctic'){
    const ic=ctx.createLinearGradient(0,H*.8,0,H);ic.addColorStop(0,e.floor+'00');ic.addColorStop(1,e.floor+'28');
    ctx.globalAlpha=.15;ctx.fillStyle=ic;ctx.fillRect(0,H*.8,W,H*.2);
    ctx.globalAlpha=.04;ctx.strokeStyle=e.floor;ctx.lineWidth=.8;for(let i=0;i<8;i++){const y=H*.8+H*.2*i/8;ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}ctx.globalAlpha=1;
  }
  if(curEnv==='ocean'){
    const oc=ctx.createLinearGradient(0,H*.65,0,H);oc.addColorStop(0,e.floor+'00');oc.addColorStop(1,e.floor+'22');
    ctx.globalAlpha=.14+Math.sin(gt*1.2)*.04;ctx.fillStyle=oc;ctx.fillRect(0,H*.65,W,H*.35);ctx.globalAlpha=1;
  }
  if(curEnv==='solar'){
    ctx.globalAlpha=.07+Math.sin(gt)*.02;const sc2=ctx.createRadialGradient(W/2,-H*.1,0,W/2,-H*.1,W*.7);sc2.addColorStop(0,e.floor);sc2.addColorStop(1,e.floor+'00');ctx.fillStyle=sc2;ctx.fillRect(0,0,W,H*.5);

const CX=x=>x*(W/cv.offsetWidth),CY=y=>y*(H/cv.offsetHeight);
function menuBtnHit(cx,cy){return cx>=W-38*SC&&cy<=38*SC;}
function doMenuTap(cx,cy){
  if(menuBtnHit(cx,cy)){menuOpen=!menuOpen;return true;}
  if(menuOpen){
    const pw=216*SC,px=W-pw-4*SC,py=36*SC,tabH=24*SC;
    const isShop=menuTab==='shop';
    const rh=isShop?40*SC:46*SC;
    const extraH=isShop?20*SC:22*SC;
    const list=isShop?SHOP:STAGES;
    const ph=tabH+extraH+list.length*rh+8*SC;
    // Tab row
    if(cx>=px&&cx<=px+pw&&cy>=py&&cy<=py+tabH){
      menuTab=cx<px+pw/2?'stages':'shop';return true;
    }
    // Inside panel
    if(cx>=px&&cx<=px+pw&&cy>=py&&cy<=py+ph){
      const cy0=py+tabH+extraH;
      const idx=Math.floor((cy-cy0)/rh);
      if(idx>=0&&idx<list.length){
        if(!isShop){if(isUnlocked(idx)){jumpStage(idx);}}
        else{buyItem(idx);}  // keep menu open for shopping
      }
      if(!isShop)menuOpen=false;
      return true;
    }
    // Outside panel — close
    menuOpen=false;return true;
  }
  return false;
}

// ── BOSS FIRE ─────────────────────────────────
function fireBoss(){

  function eb(vx,vy,r,col,hom){eB.push({x:bx,y:by,vx,vy,r:r||4*SC,col:col||C.pk,alive:true,homing:!!hom,hs:70});}
  switch(boss.pattern){
    case'spiral4':      boss.angle+=.12;for(let i=0;i<4;i++){const a=boss.angle+i*Math.PI/2;eb(Math.cos(a)*bs*.65,Math.sin(a)*bs*.65,5*SC,boss.col);}if(Math.floor(boss.phaseT*4)%16===0)for(let i=-2;i<=2;i++){const a=Math.atan2(dy,dx)+i*.18;eb(Math.cos(a)*bs,Math.sin(a)*bs,4*SC,C.ye);}break;
    case'burst_ring':   boss.angle+=.08;for(let i=0,n=10+boss.phase*2;i<n;i++){const a=boss.angle+i*Math.PI*2/n;eb(Math.cos(a)*bs*.72,Math.sin(a)*bs*.72,4.5*SC,boss.col);}break;
    case'chaos_homing': boss.angle+=.16;for(let i=0;i<6;i++){const a=boss.angle+i*Math.PI/3;eb(Math.cos(a)*bs*.8,Math.sin(a)*bs*.8,4*SC,C.pk);}if(Math.floor(boss.phaseT*3)%5===0)for(let i=0;i<3;i++){const a=Math.atan2(dy,dx)+(i-1)*.28;eb(Math.cos(a)*bs,Math.sin(a)*bs,5.5*SC,C.ye,true);}break;
    case'eruption':     boss.angle+=.07;for(let i=0;i<5;i++){const a=boss.angle+i*Math.PI*2/5;eb(Math.cos(a)*bs*.8,Math.sin(a)*bs*.8,5*SC,boss.col);}if(Math.floor(boss.phaseT*2)%6===0)eb(ax*bs*1.2,ay*bs*1.2,6.5*SC,C.ye);break;
    case'lava_bombs':   boss.angle+=.13;for(let i=0;i<4;i++){const a=boss.angle+i*Math.PI/2;eb(Math.cos(a)*bs*.9,Math.sin(a)*bs*.9,5.5*SC,boss.col);}for(let i=-1;i<=1;i++){const a=Math.atan2(dy,dx)+i*.22;eb(Math.cos(a)*bs,Math.sin(a)*bs,4.5*SC,C.ye,i===0);}break;
    case'inferno':      boss.angle+=.22;for(let i=0;i<8;i++){const a=boss.angle+i*Math.PI/4;eb(Math.cos(a)*bs*1.1,Math.sin(a)*bs*1.1,4.5*SC,boss.col);}for(let i=-2;i<=2;i++){const a=Math.atan2(dy,dx)+i*.18;eb(Math.cos(a)*bs*1.3,Math.sin(a)*bs*1.3,5*SC,C.ye,i===0);}break;
    case'ice_shards':   boss.angle+=.09;for(let i=0;i<6;i++){const a=boss.angle+i*Math.PI/3;eb(Math.cos(a)*bs*.75,Math.sin(a)*bs*.75,4.5*SC,boss.col);}if(Math.floor(boss.phaseT*3)%7===0)for(let i=-3;i<=3;i++){const a=Math.atan2(dy,dx)+i*.14;eb(Math.cos(a)*bs*.9,Math.sin(a)*bs*.9,4*SC,C.wh);}break;
    case'blizzard':     boss.angle+=.18;for(let i=0,n=12;i<n;i++){const a=boss.angle+i*Math.PI*2/n;eb(Math.cos(a)*bs*.65,Math.sin(a)*bs*.65,4*SC,boss.col);}if(Math.floor(boss.phaseT*2)%4===0)eb(ax*bs*1.1,ay*bs*1.1,6*SC,C.ic,true);break;
    case'shatter':      boss.angle+=.28;for(let i=0;i<16;i++){const a=boss.angle+i*Math.PI/8;eb(Math.cos(a)*bs,Math.sin(a)*bs,4*SC,i%2===0?boss.col:C.wh);}for(let i=-2;i<=2;i++){const a=Math.atan2(dy,dx)+i*.16;eb(Math.cos(a)*bs*1.4,Math.sin(a)*bs*1.4,5*SC,C.ic,i===0);}break;
    case'tentacle_ring':boss.angle+=.1;for(let i=0,n=8;i<n;i++){const a=boss.angle+i*Math.PI*2/n;eb(Math.cos(a)*bs*.7,Math.sin(a)*bs*.7,5*SC,boss.col);}if(Math.floor(boss.phaseT*2)%5===0)eb(ax*bs,ay*bs,6*SC,C.te,true);break;
    case'pressure_wave':boss.angle+=.14;for(let i=0,n=10;i<n;i++){const a=boss.angle+i*Math.PI*2/n;eb(Math.cos(a)*bs*.85,Math.sin(a)*bs*.85,5*SC,boss.col);}for(let i=-1;i<=1;i++){const a=Math.atan2(dy,dx)+i*.2;eb(Math.cos(a)*bs*1.2,Math.sin(a)*bs*1.2,5.5*SC,C.wh,i===0);}break;
    case'deep_void':    boss.angle+=.24;for(let i=0,n=12;i<n;i++){const a=boss.angle+i*Math.PI*2/n;eb(Math.cos(a)*bs*(.6+boss.phase*.15),Math.sin(a)*bs*(.6+boss.phase*.15),4.5*SC,boss.col);}for(let i=-2;i<=2;i++){const a=Math.atan2(dy,dx)+i*.2;eb(Math.cos(a)*bs*1.3,Math.sin(a)*bs*1.3,5*SC,C.te,Math.abs(i)<=1);}break;
    case'solar_arc':    boss.angle+=.11;for(let i=0,n=5;i<n;i++){const a=boss.angle+i*Math.PI*2/n;eb(Math.cos(a)*bs*.8,Math.sin(a)*bs*.8,5*SC,boss.col);}if(Math.floor(boss.phaseT*3)%8===0)for(let i=-3;i<=3;i++){const a=Math.atan2(dy,dx)+i*.15;eb(Math.cos(a)*bs,Math.sin(a)*bs,4.5*SC,C.ye);}break;
    case'corona_burst': boss.angle+=.19;for(let i=0,n=14;i<n;i++){const a=boss.angle+i*Math.PI*2/n;eb(Math.cos(a)*bs*.9,Math.sin(a)*bs*.9,5*SC,boss.col);}for(let i=-1;i<=1;i++){const a=Math.atan2(dy,dx)+i*.2;eb(Math.cos(a)*bs*1.3,Math.sin(a)*bs*1.3,6*SC,C.wh,i===0);}break;
    case'supernova':    boss.angle+=.3;for(let i=0;i<18;i++){const a=boss.angle+i*Math.PI/9;eb(Math.cos(a)*bs,Math.sin(a)*bs,4.5*SC,[boss.col,C.ye,C.or][i%3]);}for(let i=-3;i<=3;i++){const a=Math.atan2(dy,dx)+i*.15;eb(Math.cos(a)*bs*1.5,Math.sin(a)*bs*1.5,5.5*SC,C.ye,Math.abs(i)<=1);}break;
    case'reality_tear': boss.angle+=.12;for(let i=0,n=8;i<n;i++){const a=boss.angle+i*Math.PI*2/n;eb(Math.cos(a)*bs*.85,Math.sin(a)*bs*.85,5*SC,boss.col);}if(Math.floor(boss.phaseT*2)%6===0)for(let i=-2;i<=2;i++){const a=Math.atan2(dy,dx)+i*.2;eb(Math.cos(a)*bs*1.1,Math.sin(a)*bs*1.1,5.5*SC,C.pu,i===0);}break;
    case'collapse':     boss.angle+=.22;for(let i=0,n=12;i<n;i++){const a=boss.angle+i*Math.PI*2/n;eb(Math.cos(a)*bs*.95,Math.sin(a)*bs*.95,5*SC,boss.col);}for(let i=-2;i<=2;i++){const a=Math.atan2(dy,dx)+i*.18;eb(Math.cos(a)*bs*1.25,Math.sin(a)*bs*1.25,5.5*SC,C.vm,Math.abs(i)<=1);}if(Math.floor(boss.phaseT*3)%7===0)eb(ax*bs*1.6,ay*bs*1.6,8*SC,C.re,true);break;
    case'oblivion':     boss.angle+=.35;for(let i=0;i<20;i++){const a=boss.angle+i*Math.PI/10;eb(Math.cos(a)*bs*(1+boss.phase*.1),Math.sin(a)*bs*(1+boss.phase*.1),4.5*SC,[boss.col,C.pu,C.vm,C.pk][i%4]);}for(let i=-3;i<=3;i++){const a=Math.atan2(dy,dx)+i*.14;eb(Math.cos(a)*bs*1.6,Math.sin(a)*bs*1.6,6*SC,C.wh,Math.abs(i)<=2);}break;
  }
}

// ── BULLETS ───────────────────────────────────
function firePlayer(){
  const s=600*SC,c=ENVS[curEnv].floor;
  function b(x,y,vx,vy,p){pB.push({x,y,vx,vy,r:p>2?5*SC:3.5*SC,col:p>2?C.ye:p>1?C.gr:c,alive:true,pwr:p});}
  if(pow>=3){b(plyr.x,plyr.y-plyr.h/2,-s*.15,-s,3);b(plyr.x,plyr.y-plyr.h/2,0,-s,3);b(plyr.x,plyr.y-plyr.h/2,s*.15,-s,3);}
  else if(pow>=2){b(plyr.x-6*SC,plyr.y-plyr.h/2,-s*.06,-s,2);b(plyr.x+6*SC,plyr.y-plyr.h/2,s*.06,-s,2);}
  else b(plyr.x,plyr.y-plyr.h/2,0,-s,1);
}
function fireE(en){
  const s=(180+wave*8)*SC,dx=plyr.x-en.x,dy=plyr.y-en.y,d=Math.sqrt(dx*dx+dy*dy)||1,ax=dx/d,ay=dy/d;
  if(en.ft==='aimed')  eB.push({x:en.x,y:en.y,vx:ax*s,vy:ay*s,r:4*SC,col:en.color,alive:true,homing:false,hs:70});
  if(en.ft==='spread3')for(let i=-1;i<=1;i++){const a=Math.atan2(dy,dx)+i*.3;eB.push({x:en.x,y:en.y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,r:4*SC,col:en.color,alive:true,homing:false,hs:70});}
  if(en.ft==='spread5')for(let i=-2;i<=2;i++){const a=Math.atan2(dy,dx)+i*.22;eB.push({x:en.x,y:en.y,vx:Math.cos(a)*s*.9,vy:Math.sin(a)*s*.9,r:4*SC,col:en.color,alive:true,homing:false,hs:70});}
  if(en.ft==='spiral') {en.angle+=(en.as||2.5)*.08;for(let i=0;i<3;i++){const a=en.angle+i*Math.PI*2/3;eB.push({x:en.x,y:en.y,vx:Math.cos(a)*s*.7,vy:Math.sin(a)*s*.7,r:3.5*SC,col:en.color,alive:true,homing:false,hs:70});}}
}
function drawPB(){for(const b of pB){ctx.shadowColor=b.col;ctx.shadowBlur=10;ctx.fillStyle=b.col;ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,Math.PI*2);ctx.fill();ctx.globalAlpha=.25;ctx.beginPath();ctx.arc(b.x,b.y+b.r*2.5,b.r*.6,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1;ctx.shadowBlur=0;}}
function drawEB(){for(const b of eB){ctx.shadowColor=b.col;ctx.shadowBlur=9;ctx.fillStyle=b.col;ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,Math.PI*2);ctx.fill();if(b.homing){ctx.globalAlpha=.38;ctx.strokeStyle=C.re;ctx.lineWidth=SC;ctx.beginPath();ctx.arc(b.x,b.y,b.r*1.6,0,Math.PI*2);ctx.stroke();ctx.globalAlpha=1;}ctx.shadowBlur=0;}}

// ── PARTICLES ─────────────────────────────────
function spawnPts(x,y,col,n,spd){for(let i=0;i<n;i++){const a=Math.random()*Math.PI*2,s=Math.random()*spd+spd*.3;pts.push({x,y,vx:Math.cos(a)*s*SC,vy:Math.sin(a)*s*SC,r:(Math.random()*3+1.5)*SC,life:1,decay:Math.random()*1.5+1,col,alive:true});}}
function spawnTxt(x,y,text,col,sz){pts.push({type:'text',x,y,text,col,sz:sz||16*SC,vy:-50*SC,life:1,decay:1.2,alive:true});}
function drawPts(){for(const p of pts){if(!p.alive)continue;ctx.globalAlpha=Math.max(0,p.life);if(p.type==='text'){ctx.fillStyle=p.col;ctx.font=`bold ${p.sz}px 'Courier New'`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.shadowColor=p.col;ctx.shadowBlur=8;ctx.fillText(p.text,p.x,p.y);ctx.shadowBlur=0;}else{ctx.fillStyle=p.col;ctx.shadowColor=p.col;ctx.shadowBlur=4;ctx.beginPath();ctx.arc(p.x,p.y,Math.max(.5,p.r*p.life),0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;}}ctx.globalAlpha=1;ctx.textBaseline='alphabetic';}

// ── POWER-UPS ─────────────────────────────────
function spawnPup(x,y){const r=Math.random();pups.push({x,y,type:r<.4?'power':r<.65?'bomb':r<.85?'life':'score',vy:60,alive:true,angle:0,r:10*SC});}
function collectPup(p){p.alive=false;switch(p.type){case'power':pow=Math.min(3,pow+1);powT=10;spawnTxt(p.x,p.y,'POWER UP!',C.ye,14*SC);break;case'bomb':bombs++;spawnTxt(p.x,p.y,'BOMBA!',C.or,14*SC);break;case'life':lives++;spawnTxt(p.x,p.y,'1UP!',C.gr,16*SC);break;case'score':score+=500*SM();spawnTxt(p.x,p.y,'+'+(500*SM()),C.cy,14*SC);break;}spawnPts(p.x,p.y,C.ye,8,5);}
function drawPups(){const cols={power:C.ye,bomb:C.or,life:C.gr,score:C.cy},labs={power:'P',bomb:'B',life:'♥',score:'$'};for(const p of pups){const c=cols[p.type];ctx.shadowColor=c;ctx.shadowBlur=12;ctx.strokeStyle=c;ctx.fillStyle='#001100';ctx.lineWidth=2*SC;ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.angle);ctx.fillRect(-p.r,-p.r,p.r*2,p.r*2);ctx.strokeRect(-p.r,-p.r,p.r*2,p.r*2);ctx.restore();ctx.fillStyle=c;ctx.font=`bold ${p.r*1.1}px 'Courier New'`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(labs[p.type],p.x,p.y);ctx.shadowBlur=0;}ctx.textBaseline='alphabetic';}

// ── COLLISION ─────────────────────────────────
function cc(x1,y1,r1,x2,y2,r2){const dx=x1-x2,dy=y1-y2;return dx*dx+dy*dy<(r1+r2)*(r1+r2);}
function cr(cx,cy,r,rx,ry,rw,rh){const nx=Math.max(rx,Math.min(cx,rx+rw)),ny=Math.max(ry,Math.min(cy,ry+rh)),dx=cx-nx,dy=cy-ny;return dx*dx+dy*dy<r*r;}

// ── UPDATE ────────────────────────────────────
function update(dt){
  gt+=dt;if(flashT>0)flashT-=dt;if(invinc>0)invinc-=dt;
  updateStars(dt);
  if(STATE==='MENU'||STATE==='GAME_OVER')return;
  if(menuOpen)return;
  updateWeather(dt);
  if(STATE==='BOSS_WARN'){bossWarnT-=dt;if(bossWarnT<=0)STATE='BOSS';return;}
  if(trans){transT-=dt;if(transT<=0){trans=false;wave++;curEnv=envForWave(wave);curStage=stageForWave(wave);initStars();initWeather();loadWave(wave);}return;}
  // Player movement
  if(tch.active||mse.active){const tx=tch.active?tch.x:mse.x,ty=(tch.active?tch.y:mse.y)-75*SC,lf=Math.min(1,dt*(38+14*(upgrades.speed||0))),dx=tx-plyr.x,dy=ty-plyr.y;plyr.x+=dx*lf;plyr.y+=dy*lf;}
  plyr.x=Math.max(plyr.w/2,Math.min(W-plyr.w/2,plyr.x));plyr.y=Math.max(plyr.h/2,Math.min(H-plyr.h/2,plyr.y));
  plyr.trail.unshift({x:plyr.x,y:plyr.y});if(plyr.trail.length>8)plyr.trail.pop();
  plyr.fireT-=dt;if(plyr.fireT<=0){plyr.fireT=getFireRate();firePlayer();}
  if(pow>1){powT-=dt;if(powT<=0){pow=Math.max(1,pow-1);powT=pow>1?8:0;}}
  // Spawn
  if(STATE==='PLAYING'){spawnT2+=dt;while(spawnQ.length>0&&spawnQ[0].t<=spawnT2){const s=spawnQ.shift();spawnE(s.k);}}
  for(const en of enems)if(en.alive)updateE(en,dt);enems=enems.filter(e=>e.alive);
  if(boss&&boss.alive)updateBoss(dt);
  // Bullets
  for(const b of pB){b.x+=b.vx*dt;b.y+=b.vy*dt;if(b.y<-20||b.x<-20||b.x>W+20)b.alive=false;}
  for(const b of eB){
    if(b.homing&&invinc<=0){const dx=plyr.x-b.x,dy=plyr.y-b.y,d=Math.sqrt(dx*dx+dy*dy)||1,sp=Math.sqrt(b.vx*b.vx+b.vy*b.vy);b.vx+=(dx/d)*b.hs*dt;b.vy+=(dy/d)*b.hs*dt;const ns=Math.sqrt(b.vx*b.vx+b.vy*b.vy);b.vx=b.vx/ns*sp;b.vy=b.vy/ns*sp;}
    b.x+=b.vx*dt;b.y+=b.vy*dt;if(b.y>H+20||b.y<-100||b.x<-100||b.x>W+100)b.alive=false;
  }
  // Collisions: pB → enemies
  for(const pb of pB){if(!pb.alive)continue;for(const en of enems){if(!en.alive)continue;if(cr(pb.x,pb.y,pb.r,en.x-en.w/2,en.y-en.h/2,en.w,en.h)){pb.alive=false;en.hp-=pb.pwr;en.hitFlash=.12;if(en.hp<=0){en.alive=false;score+=100*SM();wKills++;spawnPts(en.x,en.y,en.color,12,6);spawnTxt(en.x,en.y-10*SC,'+'+(100*SM()),C.ye,13*SC);if(Math.random()<.15)spawnPup(en.x,en.y);}break;}}if(boss&&boss.alive&&!boss.dying&&cc(pb.x,pb.y,pb.r,boss.x,boss.y,boss.sz*SC*.88)){pb.alive=false;boss.hp-=pb.pwr;boss.hitFlash=.08;if(boss.hp<=0){boss.dying=true;boss.deathT=3.0;score+=3000*SM();spawnTxt(W/2,H/2-40*SC,'+'+(3000*SM()),C.ye,24*SC);bombs=bombs+1+(upgrades.rebomb?1:0);}}}
  // eB → player
  if(invinc<=0){for(const eb of eB){if(!eb.alive)continue;if(cc(eb.x,eb.y,eb.r*.7,plyr.x,plyr.y,plyr.w*.35)){eb.alive=false;plyr.x=plyr.x;spawnPts(plyr.x,plyr.y,ENVS[curEnv].floor,20,7);lives--;invinc=2.5;flashT=.2;pow=1;powT=0;if(lives<=0){save();STATE='GAME_OVER';}break;}}for(const en of enems){if(!en.alive)continue;if(cr(plyr.x,plyr.y,plyr.w*.35,en.x-en.w/2,en.y-en.h/2,en.w,en.h)){en.hp-=5;en.hitFlash=.12;if(en.hp<=0){en.alive=false;spawnPts(en.x,en.y,en.color,10,6);}spawnPts(plyr.x,plyr.y,ENVS[curEnv].floor,20,7);lives--;invinc=2.5;flashT=.2;pow=1;powT=0;if(lives<=0){save();STATE='GAME_OVER';}break;}}}
  // Power-ups
  for(const p of pups){p.y+=p.vy*dt;p.angle+=2*dt;if(p.y>H+30){p.alive=false;continue;}if(cc(p.x,p.y,p.r,plyr.x,plyr.y,plyr.w/2))collectPup(p);}pups=pups.filter(p=>p.alive);
  // Particles
  for(const p of pts){p.x+=(p.vx||0)*dt;p.y+=(p.vy||0)*dt;p.life-=(p.decay||1.5)*dt;if(p.life<=0)p.alive=false;if(p.type!=='text'){p.vx*=.97;p.vy*=.97;}}pts=pts.filter(p=>p.alive);
  pB=pB.filter(b=>b.alive);eB=eB.filter(b=>b.alive);
  // Wave clear
  if(STATE==='PLAYING'&&spawnQ.length===0&&enems.length===0&&wKills>=wNeed&&!trans){trans=true;transT=2.0;score+=500*SM();coins+=50;save();spawnTxt(W/2,H/2,'OLEADA SUPERADA  +'+(500*SM()),C.ye,18*SC);spawnPts(W/2,H/2,ENVS[curEnv].floor,30,8);}
}

  for(let i=0;i<3;i++){ctx.fillStyle=i<pow?C.ye:'#333';ctx.shadowColor=C.ye;ctx.shadowBlur=i<pow?5:0;ctx.fillRect(W-(45+(2-i)*14)*SC,15*SC,10*SC,6*SC);}ctx.shadowBlur=0;
  ctx.font=`${9*SC}px 'Courier New'`;ctx.fillStyle=C.or;ctx.fillText('BOM',W-45*SC,28*SC);ctx.shadowColor=C.or;ctx.shadowBlur=4;
  for(let i=0;i<bombs;i++){ctx.fillStyle=C.or;ctx.beginPath();ctx.arc(W-(48+i*12)*SC,38*SC,4*SC,0,Math.PI*2);ctx.fill();}ctx.shadowBlur=0;
  ctx.font=`${7.5*SC}px 'Courier New'`;ctx.fillStyle=C.ye;ctx.textAlign='right';ctx.shadowColor=C.ye;ctx.shadowBlur=4;ctx.fillText('🪙'+coins,W-6*SC,50*SC);ctx.shadowBlur=0;
  const sd=STAGES[curStage];ctx.font=`${8.5*SC}px 'Courier New'`;ctx.fillStyle='#8888bb';ctx.textAlign='left';ctx.fillText(sd.ico+' '+sd.name+'  OLA '+(wave+1),10*SC,H-12*SC);
  ctx.globalAlpha=.22;ctx.strokeStyle=C.or;ctx.lineWidth=1.5;ctx.strokeRect(W*.82,H*.87,W*.16,H*.11);ctx.font=`${8*SC}px 'Courier New'`;ctx.fillStyle=C.or;ctx.textAlign='center';ctx.fillText('BOMBA',W*.9,H*.935);ctx.globalAlpha=1;ctx.textBaseline='alphabetic';
}

// ── STAGE MENU DRAW ───────────────────────────
function drawStageMenu(){
  const ec=(STATE==='MENU')?C.ye:ENVS[curEnv].floor;
  const bx=W-34*SC,by=8*SC,bw=28*SC,bh=22*SC;
  ctx.fillStyle='#000000bb';ctx.strokeStyle=ec;ctx.lineWidth=1.5;ctx.shadowColor=ec;ctx.shadowBlur=6;ctx.fillRect(bx,by,bw,bh);ctx.strokeRect(bx,by,bw,bh);ctx.shadowBlur=0;
  ctx.fillStyle=ec;for(let i=0;i<3;i++)ctx.fillRect(bx+5*SC,by+(5+i*5)*SC,18*SC,2*SC);
  if(!menuOpen)return;
  ctx.fillStyle='#00000099';ctx.fillRect(0,0,W,H);
  const pw=216*SC,px=W-pw-4*SC,py=36*SC,tabH=24*SC;
  const isShop=menuTab==='shop';
  const rh=isShop?40*SC:46*SC;
  const list=isShop?SHOP:STAGES;
  const extraH=isShop?20*SC:22*SC;
  const ph=tabH+extraH+list.length*rh+8*SC;
  ctx.fillStyle='#06001e';ctx.strokeStyle='#6600cc';ctx.lineWidth=1.5;ctx.shadowColor='#6600cc';ctx.shadowBlur=14;
  ctx.fillRect(px,py,pw,ph);ctx.strokeRect(px,py,pw,ph);ctx.shadowBlur=0;
  // Tabs
  [{id:'stages',label:'◈ ETAPAS'},{id:'shop',label:'🪙 TIENDA'}].forEach((tab,ti)=>{
    const tx=px+ti*(pw/2),ty2=py,tw=pw/2,active=menuTab===tab.id;
    ctx.fillStyle=active?'#18003a':'#080018';ctx.fillRect(tx,ty2,tw,tabH);
    ctx.strokeStyle=active?C.pu:'#33004466';ctx.lineWidth=1;ctx.strokeRect(tx,ty2,tw,tabH);
    ctx.font=`bold ${7.5*SC}px 'Courier New'`;ctx.fillStyle=active?C.pu:'#665577';
    ctx.textAlign='center';ctx.textBaseline='middle';ctx.shadowColor=active?C.pu:'none';ctx.shadowBlur=active?7:0;
    ctx.fillText(tab.label,tx+tw/2,ty2+tabH/2);ctx.shadowBlur=0;
  });
  const cy0=py+tabH;
  if(!isShop){
    // ETAPAS content
    ctx.font=`bold ${9*SC}px 'Courier New'`;ctx.fillStyle=C.pu;ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.shadowColor=C.pu;ctx.shadowBlur=6;ctx.fillText('▸ SELECCIONAR ETAPA ◂',px+pw/2,cy0+11*SC);ctx.shadowBlur=0;
    ctx.strokeStyle='#6600cc44';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(px+8*SC,cy0+20*SC);ctx.lineTo(px+pw-8*SC,cy0+20*SC);ctx.stroke();
    for(let i=0;i<STAGES.length;i++){
      const sd=STAGES[i],ry=cy0+22*SC+i*rh,unlocked=isUnlocked(i);
      const isActive=(i===curStage&&(STATE==='PLAYING'||STATE==='BOSS'||STATE==='BOSS_WARN'));
      const col=unlocked?sd.col:'#444';
      if(isActive){ctx.fillStyle=sd.col+'28';ctx.fillRect(px+4*SC,ry+1,pw-8*SC,rh-2);}
      if(unlocked&&!isActive){ctx.globalAlpha=.05;ctx.fillStyle=sd.col;ctx.fillRect(px+4*SC,ry+1,pw-8*SC,rh-2);ctx.globalAlpha=1;}
      ctx.font=`${14*SC}px 'Courier New'`;ctx.fillStyle=col;ctx.textAlign='left';ctx.textBaseline='middle';ctx.shadowColor=col;ctx.shadowBlur=unlocked?8:0;ctx.fillText(sd.ico,px+10*SC,ry+rh/2);ctx.shadowBlur=0;
      ctx.font=`bold ${8.5*SC}px 'Courier New'`;ctx.fillStyle=col;ctx.fillText(sd.name,px+26*SC,ry+rh/2-5.5*SC);
      ctx.font=`${7.5*SC}px 'Courier New'`;ctx.fillStyle=unlocked?'#999':'#444';ctx.fillText(sd.sub,px+26*SC,ry+rh/2+5.5*SC);
      ctx.textAlign='right';
      const b=beaten.has(sd.bossId);
      if(!unlocked){ctx.font=`${7.5*SC}px 'Courier New'`;ctx.fillStyle='#555';ctx.fillText('🔒 BLOQUEADA',px+pw-8*SC,ry+rh/2);}
      else{ctx.font=`${7.5*SC}px 'Courier New'`;ctx.fillStyle=b?C.gr:sd.col;ctx.fillText(b?'✓ SUPERADA':'En progreso',px+pw-8*SC,ry+rh/2-5.5*SC);const best=stHi[i]||0;if(best>0){ctx.font=`${7*SC}px 'Courier New'`;ctx.fillStyle='#aaa';ctx.fillText(String(best).padStart(8,'0'),px+pw-8*SC,ry+rh/2+6*SC);}}
      ctx.textAlign='left';
      if(i<STAGES.length-1){ctx.strokeStyle='#ffffff10';ctx.lineWidth=.8;ctx.beginPath();ctx.moveTo(px+8*SC,ry+rh-1);ctx.lineTo(px+pw-8*SC,ry+rh-1);ctx.stroke();}
    }
  } else {
    // TIENDA content — coin balance header
    ctx.font=`bold ${9.5*SC}px 'Courier New'`;ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillStyle=C.ye;ctx.shadowColor=C.ye;ctx.shadowBlur=10;ctx.fillText('🪙 '+coins+' MONEDAS',px+pw/2,cy0+10*SC);ctx.shadowBlur=0;
    ctx.strokeStyle='#ffffff10';ctx.lineWidth=.8;ctx.beginPath();ctx.moveTo(px+8*SC,cy0+18*SC);ctx.lineTo(px+pw-8*SC,cy0+18*SC);ctx.stroke();
    for(let i=0;i<SHOP.length;i++){
      const it=SHOP[i],ry=cy0+20*SC+i*rh;
      const owned=upgrades[it.upg]||0,maxed=owned>=it.max,canBuy=!maxed&&coins>=it.price;
      const rc=maxed?C.gr:canBuy?it.col:'#555';
      if(maxed){ctx.globalAlpha=.07;ctx.fillStyle=C.gr;ctx.fillRect(px+4*SC,ry+1,pw-8*SC,rh-2);ctx.globalAlpha=1;}
      else if(canBuy){ctx.globalAlpha=.05;ctx.fillStyle=it.col;ctx.fillRect(px+4*SC,ry+1,pw-8*SC,rh-2);ctx.globalAlpha=1;}
      // icon
      ctx.font=`${14*SC}px serif`;ctx.fillStyle=rc;ctx.textAlign='left';ctx.textBaseline='middle';
      ctx.shadowColor=rc;ctx.shadowBlur=canBuy?7:0;ctx.fillText(it.icon,px+8*SC,ry+rh*.4);ctx.shadowBlur=0;
      // name + desc
      ctx.font=`bold ${7.5*SC}px 'Courier New'`;ctx.fillStyle=maxed?C.gr:canBuy?C.wh:'#666';ctx.fillText(it.name,px+26*SC,ry+rh*.3);
      ctx.font=`${6.5*SC}px 'Courier New'`;ctx.fillStyle='#778';ctx.fillText(it.desc,px+26*SC,ry+rh*.58);
      // level dots
      if(it.max>1){for(let d=0;d<it.max;d++){ctx.fillStyle=d<owned?it.col:'#2a2a3a';ctx.beginPath();ctx.arc(px+26*SC+d*9*SC,ry+rh*.82,2.8*SC,0,Math.PI*2);ctx.fill();}}
      // right col
      ctx.textAlign='right';
      if(maxed){ctx.font=`bold ${7.5*SC}px 'Courier New'`;ctx.fillStyle=C.gr;ctx.shadowColor=C.gr;ctx.shadowBlur=5;ctx.fillText('✓ MAX',px+pw-7*SC,ry+rh/2);ctx.shadowBlur=0;}
      else{
        ctx.font=`bold ${7.5*SC}px 'Courier New'`;ctx.fillStyle=canBuy?C.ye:'#555';ctx.fillText('🪙'+it.price,px+pw-7*SC,ry+rh*.28);
        const bw2=34*SC,bh2=13*SC,bx2=px+pw-bw2-7*SC,by2=ry+rh*.52;
        ctx.fillStyle=canBuy?'#002200':'#0d0d0d';ctx.strokeStyle=canBuy?C.gr:'#333';ctx.lineWidth=1;
        ctx.fillRect(bx2,by2,bw2,bh2);ctx.strokeRect(bx2,by2,bw2,bh2);
        ctx.font=`bold ${6.5*SC}px 'Courier New'`;ctx.fillStyle=canBuy?C.gr:'#444';ctx.textAlign='center';ctx.textBaseline='middle';
        ctx.fillText('COMPRAR',bx2+bw2/2,by2+bh2/2);
      }
      ctx.textAlign='left';ctx.textBaseline='middle';
      if(i<SHOP.length-1){ctx.strokeStyle='#ffffff08';ctx.lineWidth=.8;ctx.beginPath();ctx.moveTo(px+8*SC,ry+rh-1);ctx.lineTo(px+pw-8*SC,ry+rh-1);ctx.stroke();}
    }
  }
  ctx.textBaseline='alphabetic';ctx.textAlign='left';
}

// ── MAIN MENU ─────────────────────────────────
function drawMenu(){
  ctx.textAlign='center';ctx.textBaseline='middle';
  const p=.7+.3*Math.sin(gt*2.2);
  ctx.shadowColor=C.cy;ctx.shadowBlur=32*p;ctx.font=`bold ${34*SC}px 'Courier New'`;ctx.fillStyle=C.cy;ctx.fillText('NEON',W/2,H*.26);
  ctx.shadowColor=C.pk;ctx.shadowBlur=32*p;ctx.fillStyle=C.pk;ctx.fillText('REQUIEM',W/2,H*.35);ctx.shadowBlur=0;
  ctx.font=`${9.5*SC}px 'Courier New'`;ctx.fillStyle=C.pu;ctx.fillText('BULLET HELL  ·  MOBILE',W/2,H*.43);
  ctx.strokeStyle=C.cy;ctx.globalAlpha=.22;ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(W*.18,H*.47);ctx.lineTo(W*.82,H*.47);ctx.stroke();ctx.globalAlpha=1;
  ctx.font=`${8.5*SC}px 'Courier New'`;ctx.fillStyle='#9999cc';
  ctx.fillText('ARRASTRA para mover  ·  Nave sigue el dedo',W/2,H*.52);
  ctx.fillText('Disparo automático  ·  BOMBA: esquina inferior',W/2,H*.58);
  ctx.font=`${8*SC}px 'Courier New'`;ctx.fillStyle='#555';ctx.fillText('6 JEFES  ·  6 ESCENARIOS  ·  30 OLEADAS',W/2,H*.64);
  // Stage previews
  STAGES.forEach((sd,i)=>{const x=W*(.22+i*.115),y2=H*.70,unlocked=isUnlocked(i);ctx.globalAlpha=unlocked?.9:.22;ctx.font=`${12*SC}px 'Courier New'`;ctx.fillStyle=sd.col;ctx.shadowColor=sd.col;ctx.shadowBlur=unlocked?8:0;ctx.fillText(sd.ico,x,y2);ctx.shadowBlur=0;});
  ctx.globalAlpha=1;
  ctx.globalAlpha=.5+(Math.sin(gt*3)+1)/2*.5;ctx.font=`bold ${12*SC}px 'Courier New'`;ctx.fillStyle=C.ye;ctx.shadowColor=C.ye;ctx.shadowBlur=10;ctx.fillText('[ TOCA PARA COMENZAR ]',W/2,H*.82);ctx.shadowBlur=0;ctx.globalAlpha=1;
  ctx.font=`${9*SC}px 'Courier New'`;ctx.fillStyle=C.or;ctx.fillText('HI SCORE  '+String(hiScore).padStart(8,'0'),W/2,H*.91);
  ctx.textBaseline='alphabetic';ctx.textAlign='left';
}

// ── BOSS WARNING ──────────────────────────────
function drawBossWarn(){
  const p=(Math.sin(gt*9)+1)/2;ctx.globalAlpha=.15+p*.45;ctx.fillStyle=C.re;ctx.fillRect(0,0,W,H);ctx.globalAlpha=1;
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.font=`bold ${17*SC}px 'Courier New'`;ctx.fillStyle=C.re;ctx.shadowColor=C.re;ctx.shadowBlur=20;ctx.fillText('⚠  ALERTA  ⚠',W/2,H*.38);
  ctx.font=`bold ${21*SC}px 'Courier New'`;ctx.fillStyle=C.ye;ctx.shadowColor=C.ye;ctx.fillText('JEFE DETECTADO',W/2,H*.47);
  if(boss){ctx.font=`bold ${15*SC}px 'Courier New'`;ctx.fillStyle=boss.col;ctx.shadowColor=boss.col;ctx.fillText(boss.name,W/2,H*.57);ctx.font=`${9.5*SC}px 'Courier New'`;ctx.fillStyle='#aaa';ctx.shadowBlur=0;ctx.fillText(boss.sub,W/2,H*.65);}
  ctx.shadowBlur=0;ctx.textBaseline='alphabetic';ctx.textAlign='left';
}

// ── GAME OVER ─────────────────────────────────
function drawGameOver(){
  ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillStyle='rgba(0,0,0,.75)';ctx.fillRect(0,0,W,H);
  ctx.font=`bold ${26*SC}px 'Courier New'`;ctx.fillStyle=C.re;ctx.shadowColor=C.re;ctx.shadowBlur=20;ctx.fillText('GAME OVER',W/2,H*.32);
  ctx.font=`${12*SC}px 'Courier New'`;ctx.fillStyle=C.ye;ctx.shadowColor=C.ye;ctx.fillText('PUNTUACIÓN  '+String(score).padStart(8,'0'),W/2,H*.44);
  if(score>=hiScore&&score>0){ctx.font=`bold ${11*SC}px 'Courier New'`;ctx.fillStyle=C.cy;ctx.shadowColor=C.cy;ctx.fillText('✦ NUEVO RÉCORD ✦',W/2,H*.52);}
  ctx.font=`${9.5*SC}px 'Courier New'`;ctx.fillStyle='#666';ctx.shadowBlur=0;ctx.fillText('MEJOR  '+String(hiScore).padStart(8,'0'),W/2,H*.60);
  const sd=STAGES[curStage];ctx.font=`${9*SC}px 'Courier New'`;ctx.fillStyle=sd.col;ctx.fillText('LLEGASTE A: '+sd.ico+' '+sd.name,W/2,H*.68);
  ctx.globalAlpha=.5+(Math.sin(gt*3)+1)/2*.5;ctx.font=`bold ${12*SC}px 'Courier New'`;ctx.fillStyle=C.wh;ctx.fillText('[ TOCA PARA REINTENTAR ETAPA ]',W/2,H*.80);ctx.globalAlpha=1;ctx.textBaseline='alphabetic';ctx.textAlign='left';
}

// ── DRAW ──────────────────────────────────────
function draw(){
  ctx.clearRect(0,0,W,H);drawEnvBg();drawStars();
  if(STATE==='MENU'){drawWeather();drawMenu();drawStageMenu();if(flashT>0){ctx.globalAlpha=flashT*.8;ctx.fillStyle=C.wh;ctx.fillRect(0,0,W,H);ctx.globalAlpha=1;}return;}
  if(STATE==='GAME_OVER'){drawGameOver();if(flashT>0){ctx.globalAlpha=flashT*.8;ctx.fillStyle=C.wh;ctx.fillRect(0,0,W,H);ctx.globalAlpha=1;}return;}
  drawWeather();drawPups();drawPts();
  for(const en of enems)drawE(en);
  if(boss&&boss.alive)drawBoss();
  drawPB();drawEB();drawPlyr();drawHUD();drawStageMenu();
  if(STATE==='BOSS_WARN')drawBossWarn();
  if(trans){ctx.globalAlpha=Math.min(.5,(1-transT/2)*1.5);ctx.fillStyle='#000015';ctx.fillRect(0,0,W,H);ctx.globalAlpha=1;}
  if(flashT>0){ctx.globalAlpha=flashT*.8;ctx.fillStyle=C.wh;ctx.fillRect(0,0,W,H);ctx.globalAlpha=1;}
}

// ── LOOP ──────────────────────────────────────
function loop(ts){const dt=Math.min((ts-lastT)/1000,.05);lastT=ts;update(dt);draw();requestAnimationFrame(loop);}
curEnv='cyber';initStars();initWeather();initPlyr();
requestAnimationFrame(ts=>{lastT=ts;requestAnimationFrame(loop);});
</script>
</body>
</html>
